<!DOCTYPE html>
<html>
<head>
<title>Booking History</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
min-height:100vh;
}

nav{
background:#111;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 20px #00ffcc33;
}

nav h2{
color:#00ffcc;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:.3s;
}

nav a:hover{
color:#00ffcc;
}

.container{
padding:40px;
animation:fadeIn 1s ease;
}

.title{
font-size:45px;
color:#00ffcc;
margin-bottom:30px;
}

.card{
background:#151515;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,204,.15);
animation:slideUp .8s ease;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#00ffcc;
color:black;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #333;
}

tr:hover{
background:#1c1c1c;
transition:.3s;
}

.history-count{
margin-bottom:20px;
font-size:18px;
color:#aaa;
}

.badge{
background:#00ffcc;
color:black;
padding:5px 12px;
border-radius:20px;
font-weight:bold;
}

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<nav>

<h2>🚗 Smart Parking</h2>

<div>
<a href="/">Home</a>
<a href="/admin">Admin</a>
<a href="/history">History</a>
</div>

</nav>

<div class="container">

<h1 class="title">Booking History</h1>

<div class="history-count">
Total Records:
<span class="badge">
{{ history|length }}
</span>
</div>

<div class="card">

<table>

<tr>
<th>ID</th>
<th>Vehicle Number</th>
<th>Slot Number</th>
</tr>

{% for item in history %}

<tr>
<td>{{ item[0] }}</td>
<td>{{ item[1] }}</td>
<td>{{ item[2] }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>
