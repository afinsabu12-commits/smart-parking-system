<h2>Parking Slots</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Slot Number</th>
    <th>Status</th>
    <th>Update</th>
    <th>Delete</th>
</tr>

{% for slot in slots %}
<tr>

    <td>{{ slot[0] }}</td>
    <td>{{ slot[1] }}</td>
    <td>{{ slot[2] }}</td>

    <td>
        <form action="/update_slot/{{ slot[0] }}" method="POST">
            <button type="submit">
                Change Status
            </button>
        </form>
    </td>

    <td>
        <form action="/delete_slot/{{ slot[0] }}" method="POST">
            <button type="submit">
                Delete
            </button>
        </form>
    </td>

</tr>
{% endfor %}

</table>
